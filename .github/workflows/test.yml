name: TaxiPulse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas numpy scipy sqlalchemy psycopg2-binary loguru python-dotenv requests pyarrow kafka-python-ng minio slack-sdk

      - name: Create .env file
        run: |
          cp .env.example .env

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: |
          python -m py_compile config/settings.py
          python -m py_compile config/constants.py
          python -m py_compile quality/validate_data.py
          python -m py_compile quality/expectations/taxi_expectations.py
          python -m py_compile anomaly_detection/detector.py
          python -m py_compile anomaly_detection/alerting.py
          echo "✅ All files compile successfully"