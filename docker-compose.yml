# ============================================================
# TaxiPulse — Docker Compose (Full Local Infrastructure)
# ============================================================
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down            # Stop all services
#   docker-compose down -v         # Stop + remove all data volumes
#   docker-compose ps              # Check service status
#   docker-compose logs <service>  # View logs for a service
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  env_file:
    - .env
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    - AIRFLOW__CORE__FERNET_KEY=81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaXe0yb8=
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=true
    - MINIO_ENDPOINT=minio:9000
    - MINIO_ACCESS_KEY=taxipulse
    - MINIO_SECRET_KEY=taxipulse123
    - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    - POSTGRES_HOST=postgres
    - POSTGRES_PORT=5432
    - POSTGRES_DB=taxipulse
    - POSTGRES_USER=taxipulse
    - POSTGRES_PASSWORD=taxipulse123
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./ingestion:/opt/airflow/ingestion
    - ./transformations:/opt/airflow/transformations
    - ./quality:/opt/airflow/quality
    - ./anomaly_detection:/opt/airflow/anomaly_detection
    - ./config:/opt/airflow/config
  depends_on:
    postgres-airflow:
      condition: service_healthy
    postgres:
      condition: service_healthy
    minio:
      condition: service_started

services:

  # ==========================================================
  # PostgreSQL — TaxiPulse Data Warehouse
  # ==========================================================
  # This is your main data warehouse (replaces BigQuery)
  # Contains bronze, silver, and gold schemas

  postgres:
    image: postgres:16-alpine
    container_name: taxipulse-postgres
    environment:
      POSTGRES_DB: taxipulse
      POSTGRES_USER: taxipulse
      POSTGRES_PASSWORD: taxipulse123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxipulse -d taxipulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================
  # PostgreSQL — Airflow Metadata Database
  # ==========================================================
  # Separate DB for Airflow's internal metadata (best practice)

  postgres-airflow:
    image: postgres:16-alpine
    container_name: taxipulse-postgres-airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================
  # MinIO — S3-Compatible Object Storage (Data Lake)
  # ==========================================================
  # Replaces GCS/S3. Access Web UI at http://localhost:9001

  minio:
    image: minio/minio:latest
    container_name: taxipulse-minio
    environment:
      MINIO_ROOT_USER: taxipulse
      MINIO_ROOT_PASSWORD: taxipulse123
    ports:
      - "9000:9000"    # API endpoint
      - "9001:9001"    # Web Console UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================
  # MinIO Setup — Creates the initial bucket
  # ==========================================================
  # Runs once on startup to create the data lake bucket

  minio-setup:
    image: minio/mc:latest
    container_name: taxipulse-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set taxipulse http://minio:9000 taxipulse taxipulse123;
      mc mb taxipulse/taxipulse-data-lake --ignore-existing;
      mc mb taxipulse/taxipulse-data-lake/bronze --ignore-existing;
      mc mb taxipulse/taxipulse-data-lake/silver --ignore-existing;
      mc mb taxipulse/taxipulse-data-lake/gold --ignore-existing;
      echo '✅ MinIO buckets created successfully!';
      "

  # ==========================================================
  # Zookeeper — Required for Kafka
  # ==========================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: taxipulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  # ==========================================================
  # Apache Kafka — Streaming Platform
  # ==========================================================

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: taxipulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ==========================================================
  # Airflow Webserver — Pipeline UI
  # ==========================================================
  # Access at http://localhost:8080 (user: admin, pass: admin)

  airflow-webserver:
    <<: *airflow-common
    container_name: taxipulse-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ==========================================================
  # Airflow Scheduler — Executes DAGs
  # ==========================================================

  airflow-scheduler:
    <<: *airflow-common
    container_name: taxipulse-airflow-scheduler
    command: scheduler
    restart: unless-stopped

  # ==========================================================
  # Airflow Init — One-time setup
  # ==========================================================
  # Creates DB tables, admin user, and initial configuration

  airflow-init:
    <<: *airflow-common
    container_name: taxipulse-airflow-init
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@taxipulse.dev &&
      echo '✅ Airflow initialized successfully!';
      "
    restart: "no"

# ==========================================================
# Persistent Volumes
# ==========================================================

volumes:
  postgres_data:
    name: taxipulse-postgres-data
  postgres_airflow_data:
    name: taxipulse-postgres-airflow-data
  minio_data:
    name: taxipulse-minio-data
  zookeeper_data:
    name: taxipulse-zookeeper-data
  kafka_data:
    name: taxipulse-kafka-data